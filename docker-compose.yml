services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: caselens
      POSTGRES_USER: caselens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caselens-development}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caselens -d caselens"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
    environment: &backend_environment
      DATABASE_URL: postgresql+psycopg://caselens:${POSTGRES_PASSWORD:-caselens-development}@db:5432/caselens
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-development-only-change-this-secret}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      EVIDENCE_ROOT: /data/evidence
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-104857600}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-CaseLens Administrator}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-this-password}
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - evidence_data:/data/evidence

  worker:
    build:
      context: ./backend
    environment: *backend_environment
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evidence_data:/data/evidence

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  evidence_data:
